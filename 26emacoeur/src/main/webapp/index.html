<!DOCTYPE html>
<html>
    <head>
        <meta http-equiv="Content-Type" content="text/html; charset=UTF-8">
        <title>Emacoeur - Accueil</title>
        <style>
            body {
                font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
                background-color: #f8f9fa;
                margin: 0;
                display: flex;
                flex-direction: column;
                align-items: center;
                justify-content: center;
                height: 100vh;
            }

            h1 {
                color: #c0392b;
                text-transform: uppercase;
                letter-spacing: 2px;
                margin-bottom: 40px;
                border-bottom: 3px solid #c0392b;
                padding-bottom: 10px;
            }

            .menu-container {
                display: flex;
                gap: 25px;
                padding: 20px;
            }

            .btn {
                background-color: white;
                color: #2c3e50;
                text-decoration: none;
                width: 180px;
                height: 150px;
                display: flex;
                flex-direction: column;
                align-items: center;
                justify-content: center;
                border-radius: 12px;
                border: 1px solid #ddd;
            }

            .btn:hover {
                background-color: #c0392b;
            }

            .icon {
                font-size: 3rem;
                margin-bottom: 10px;
            }

            .label {
                font-weight: bold;
                font-size: 1.1rem;
            }
        </style>
    </head>
    <body>

        <h1>EmaCoeur : Accueil de la gestion SDIS</h1>

        <div class="menu-container">
            
            <a href="PompierServlet/listerPompier" class="btn">
                <span class="label">Pompiers</span>
            </a>

            <a href="CaserneServlet/listerCaserne" class="btn">
                <span class="label">Casernes</span>
            </a>

            <a href="InterventionServlet/listerIntervention" class="btn">
                <span class="label">Interventions</span>
            </a>
            
            <a href="EnginServlet/listerEngin" class="btn">
                <span class="label">Engins</span>
            </a>
            
            <a href="ProfessionServlet/listerProfession" class="btn">
                <span class="label">Profession</span>
            </a>

        </div>
    </body>
</html>
